name: Release CI

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build specific targets
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: vyzorix-linux-amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: vyzorix-macos-intel
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: vyzorix-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: vyzorix-windows-amd64.exe

    steps:
      - uses: actions/checkout@v3

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Global Binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/vyzorix
