[package]
name = "vyzorix"
version = "1.0.0"
edition = "2021"
description = "Vyzorix Workspace Management CLI"
authors = ["Vyzorix Engineering <eng@vyzorix.com>"]

[dependencies]
clap = { version = "4.4", features = ["derive", "env"] }
tokio = { version = "1.35", features = ["full", "rt-multi-thread"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
colored = "2.0"
thiserror = "1.0"
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
dotenvy = "0.15"
dialoguer = "0.11"
indicatif = "0.17"
toml = "0.8"
chrono = "0.4"
reqwest = { version = "0.12", features = ["json", "rustls-tls", "stream"] }
dirs = "5.0"
aes-gcm = "0.10"
rand = "0.8"
hex = "0.4"
flate2 = "1.0"
tar = "0.4"
ignore = "0.4"
sha2 = "0.10"
notify = "6.1"
ratatui = "0.26"
crossterm = "0.27"
wasmtime = "18.0"
tokio-util = { version = "0.7", features = ["codec", "io"] }
tokio-stream = "0.1"
futures-util = "0.3"
axum = "0.7"
tower-http = { version = "0.5", features = ["fs"] }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = true

[dev-dependencies]
assert_cmd = "2.0"
predicates = "3.0"
