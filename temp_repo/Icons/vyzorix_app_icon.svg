<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definitions for colors and standard styles -->
  <defs>
    <style>
      .bg-rect {
        fill: #f23d6d;
      }
      .circuit-line {
        fill: none;
        stroke: #ffffff;
        stroke-width: 14;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .circuit-terminal {
        fill: #f23d6d;
        stroke: #ffffff;
        stroke-width: 12;
      }
    </style>
  </defs>

  <!-- Fluent iOS/Android style rounded launcher base -->
  <rect x="32" y="32" width="448" height="448" rx="100" class="bg-rect" />

  <!-- Foreground Circuitry - Structured like a digital 'W' or double-'V' letter -->
  <g id="circuit-traces">
    <!-- Left outer trace -->
    <path d="M 130,140 L 175,230 L 230,340" class="circuit-line" />
    
    <!-- Left inner trace -->
    <path d="M 195,140 L 235,220 L 290,340" class="circuit-line" />
    
    <!-- Right inner trace -->
    <path d="M 315,140 L 355,220 L 385,280" class="circuit-line" />
    
    <!-- Right outer trace -->
    <path d="M 380,140 L 335,230 L 285,330 L 285,380" class="circuit-line" />

    <!-- Left side branch helper trace -->
    <path d="M 175,230 L 225,330" class="circuit-line" />

    <!-- Terminal Rings: Placed perfectly at path endings to look like physical PCB solder pads -->
    <!-- Top Row Terminals -->
    <circle cx="130" cy="140" r="15" class="circuit-terminal" />
    <circle cx="195" cy="140" r="15" class="circuit-terminal" />
    <circle cx="315" cy="140" r="15" class="circuit-terminal" />
    <circle cx="380" cy="140" r="15" class="circuit-terminal" />

    <!-- Middle/Bottom Terminals -->
    <circle cx="230" cy="340" r="15" class="circuit-terminal" />
    <circle cx="290" cy="340" r="15" class="circuit-terminal" />
    <circle cx="385" cy="280" r="15" class="circuit-terminal" />
    <circle cx="285" cy="380" r="15" class="circuit-terminal" />
  </g>
</svg>
