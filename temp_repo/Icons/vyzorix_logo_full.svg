<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 512" width="100%" height="100%">
  <!-- Definitions for clean custom styles and fonts -->
  <defs>
    <style>
      .logo-text {
        font-family: 'Space Grotesk', 'Inter', -apple-system, sans-serif;
        font-weight: 700;
        fill: #1a1f2c;
        font-size: 160px;
        letter-spacing: -4px;
      }
      .logo-x-path {
        fill: none;
        stroke: #f23d6d;
        stroke-width: 25;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .logo-x-dot {
        fill: #f23d6d;
      }
    </style>
  </defs>

  <!-- Clean backdrop for presentation (Optional, transparent by default, but let's keep it clean) -->
  <g id="vyzorix-logo-full">
    <!-- Vyzor text -->
    <text x="140" y="315" class="logo-text">Vyzor</text>

    <!-- Stylized "X" with a dot on its high-right leg -->
    <!-- Left-to-right diagonal path -->
    <path d="M 640,165 L 755,325" class="logo-x-path" />
    <!-- Right-to-left diagonal path -->
    <path d="M 755,165 L 640,325" class="logo-x-path" />
    
    <!-- Floating circular dot strictly centered over the top-right end of the X (755, 165) -->
    <circle cx="780" cy="115" r="18" class="logo-x-dot" />
  </g>
</svg>
